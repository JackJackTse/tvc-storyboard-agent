<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TVC Storyboard Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body, html, #root {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: #0a0a0a;
        /* Prevent browser pinch-to-zoom on the entire page */
        touch-action: pan-x pan-y;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Custom Scrollbar for Chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      /* Thin scrollbar for script */
      .scrollbar-thin::-webkit-scrollbar {
          width: 4px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
          background: transparent;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
          background: #333;
          border-radius: 2px;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover {
          background: #444;
      }
      /* Cursor blink animation for streaming text */
      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .animate-cursor-blink {
        animation: cursor-blink 0.8s ease-in-out infinite;
      }
      /* Fade in animation for canvas nodes */
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-fade-in {
        animation: fade-in 400ms ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Prevent browser zoom on Ctrl+wheel (Mac trackpad pinch triggers this)
      document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      }, { passive: false });

      // Prevent Safari gesture zoom
      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
      });
      document.addEventListener('gesturechange', function(e) {
        e.preventDefault();
      });
      document.addEventListener('gestureend', function(e) {
        e.preventDefault();
      });
    </script>
  </body>
</html>
